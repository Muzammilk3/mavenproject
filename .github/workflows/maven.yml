name: mvn pipeline
on:
  push:
    branches: ["master"]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
     - name: collecting the src code
       uses: actions/checkout@v7.0.0
       
     - name: installing the java 
       uses: actions/setup-java@v5.5.0
       with:
         java-version: '21'
         distribution: 'temurin'
         
     - name: compiling the mvn src code
       run: mvn package
